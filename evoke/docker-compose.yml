name: evoke

# Cross-project depends_on (waiting on postgres/redpanda/opensearch/minio, which
# live in evoke-infra's own compose project) is not something Docker Compose can
# express — a service can only depend_on services defined in its own compose file.
# Bring-up order across the two stacks is a runtime contract (evoke-infra up first,
# per BUILD_PLAN.md), not a compose-level one. Within this file, web/brightspace-sim/
# minecraft-bridge have no hard startup-order dependency on each other today (checked:
# brightspace-sim's EVOKE_API_URL is used for outbound webhook calls at grade time,
# not needed at its own startup; minecraft-bridge only talks to evoke-infra services).

services:
  web:
    build: .
    ports:
      - "8000:8000"
    networks:
      - evoke-infra-network
    environment:
      DATABASE_URL: postgresql://evoke:devsecret123@postgres:5432/evoke
      REDPANDA_BROKER: redpanda:29092
      OPENSEARCH_NODE: http://opensearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: devsecret123
      BRIGHTSPACE_SIM_URL: http://brightspace-sim:8001
      BRIGHTSPACE_CLIENT_ID: ${BRIGHTSPACE_CLIENT_ID:-}
      BRIGHTSPACE_CLIENT_SECRET: ${BRIGHTSPACE_CLIENT_SECRET:-}
      BRIGHTSPACE_TENANT_URL: ${BRIGHTSPACE_TENANT_URL:-}
      BRIGHTSPACE_ORG_UNIT_ID: ${BRIGHTSPACE_ORG_UNIT_ID:-}
      # Service-account creds for real submission push/grade pull
      # (evoke/lms/brightspace_lms.py's get_brightspace_lms(), D2L's older
      # ID/Key scheme -- distinct from the OAuth client id/secret above).
      # Names differ on purpose: .env uses BRIGHTSPACE_APPLICATION_ID/_KEY,
      # matching the labels Brightspace's own Manage Extensibility admin
      # tool shows; the Python code reads BRIGHTSPACE_APP_KEY/_SECRET. This
      # block was missing entirely before, so setting either .env name did
      # nothing -- get_brightspace_lms() always fell back to simulator mode.
      BRIGHTSPACE_APP_KEY: ${BRIGHTSPACE_APPLICATION_ID:-}
      BRIGHTSPACE_APP_SECRET: ${BRIGHTSPACE_APPLICATION_KEY:-}
      # RS256 private key (base64 PEM) for signing the client_credentials JWT
      # assertion the Trusted service app requires -- see /.well-known/jwks.json
      # (main.py) for the matching public key served over the ngrok tunnel.
      BRIGHTSPACE_SERVICE_PRIVATE_KEY_B64: ${BRIGHTSPACE_SERVICE_PRIVATE_KEY_B64:-}
      # OAuth 2.0 login (evoke/oauth_providers.py) -- like BRIGHTSPACE_CLIENT_ID
      # above, these were sitting in .env but never reaching this container
      # since this block is an explicit allowlist, not env_file: .env.
      AUTH_PROVIDER: ${AUTH_PROVIDER:-}
      BRIGHTSPACE_OAUTH_AUTHORIZE_URL: ${BRIGHTSPACE_OAUTH_AUTHORIZE_URL:-}
      BRIGHTSPACE_OAUTH_TOKEN_URL: ${BRIGHTSPACE_OAUTH_TOKEN_URL:-}
      BRIGHTSPACE_OAUTH_REDIRECT_URI: ${BRIGHTSPACE_OAUTH_REDIRECT_URI:-}
      BRIGHTSPACE_OAUTH_SCOPES: ${BRIGHTSPACE_OAUTH_SCOPES:-}
      AI_GATEWAY_URL: http://litellm:4000
      AI_GATEWAY_KEY: ${LITELLM_MASTER_KEY:-sk-devsecret123}
      AI_ENABLED: "true"
      MINECRAFT_PUBLIC_HOST: ${MINECRAFT_PUBLIC_HOST:-localhost}
      # These previously aliased PORT_MINECRAFT/PORT_MINECRAFT_BEDROCK (the
      # vars that control the actual Docker host-port binding in
      # evoke-infra/docker-compose.yml), so there was no way to advertise a
      # different external port than the container's real bind port -- e.g.
      # for a router-level port remap (external X -> internal 25565/19132).
      # Now genuinely independent, matching MINECRAFT_PUBLIC_HOST's pattern.
      MINECRAFT_PUBLIC_PORT_JAVA: ${MINECRAFT_PUBLIC_PORT_JAVA:-25565}
      MINECRAFT_PUBLIC_PORT_BEDROCK: ${MINECRAFT_PUBLIC_PORT_BEDROCK:-19132}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-devsecret123}
      # Real session hardening (evoke/auth_session.py) -- signs the session
      # cookie every route now relies on via get_current_user/require_self/
      # get_current_admin, instead of trusting a client-supplied user_id.
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-insecure-secret-change-me}
      # The one non-Brightspace login (POST /api/admin/login), for reaching
      # #/admin without an LMS account. Unset EVOKE_ADMIN_PASSWORD_HASH ->
      # disabled, not silently open -- see scripts/hash_admin_password.py.
      EVOKE_ADMIN_USERNAME: ${EVOKE_ADMIN_USERNAME:-admin}
      EVOKE_ADMIN_PASSWORD_HASH: ${EVOKE_ADMIN_PASSWORD_HASH:-}
      # .env.example has documented this since it was added, but it was
      # never actually wired through here -- setting it in .env silently
      # did nothing; main.py's _companion_url() never saw it.
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  brightspace-sim:
    build:
      context: ../brightspace-sim
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - evoke-infra-network
    environment:
      EVOKE_API_URL: http://web:8000
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minecraft-bridge:
    build:
      context: ../evoke-minecraft-bridge
      dockerfile: Dockerfile
    networks:
      - evoke-infra-network
    environment:
      DATABASE_URL: postgresql://evoke:devsecret123@postgres:5432/evoke
      REDPANDA_BROKER: redpanda:29092
      # Previously hardcoded to the local `minecraft` container -- these were
      # never actually configurable via .env until now, matching the same gap
      # already found and fixed for PUBLIC_WEB_URL/MINECRAFT_PUBLIC_PORT_JAVA.
      MINECRAFT_HOST: ${MINECRAFT_BRIDGE_HOST:-minecraft}
      MINECRAFT_RCON_PORT: ${MINECRAFT_BRIDGE_RCON_PORT:-25575}
      RCON_PASSWORD: ${MINECRAFT_BRIDGE_RCON_PASSWORD:-devsecret123}
      AI_GATEWAY_URL: http://litellm:4000
      AI_GATEWAY_KEY: ${LITELLM_MASTER_KEY:-sk-devsecret123}
      AUTO_LINK_PLAYER_ONE: ${AUTO_LINK_PLAYER_ONE:-true}
    healthcheck:
      # No HTTP server in this service (a Kafka consumer loop) — process-liveness
      # only, not a real readiness signal. A proper check would need bridge.py to
      # write a heartbeat file this checks the freshness of; flagged, not built here.
      test: ["CMD-SHELL", "pgrep -f bridge.py || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  evoke-infra-network:
    external: true
