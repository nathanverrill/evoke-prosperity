name: evoke

# Cross-project depends_on (waiting on postgres/redpanda/opensearch/minio, which
# live in evoke-infra's own compose project) is not something Docker Compose can
# express — a service can only depend_on services defined in its own compose file.
# Bring-up order across the two stacks is a runtime contract (evoke-infra up first,
# per BUILD_PLAN.md), not a compose-level one. Within this file, web/brightspace-sim/
# minecraft-bridge have no hard startup-order dependency on each other today (checked:
# brightspace-sim's EVOKE_API_URL is used for outbound webhook calls at grade time,
# not needed at its own startup; minecraft-bridge only talks to evoke-infra services).

services:
  web:
    build: .
    ports:
      - "8000:8000"
    networks:
      - evoke-infra-network
    environment:
      DATABASE_URL: postgresql://evoke:devsecret123@postgres:5432/evoke
      REDPANDA_BROKER: redpanda:29092
      OPENSEARCH_NODE: http://opensearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: devsecret123
      BRIGHTSPACE_SIM_URL: http://brightspace-sim:8001
      OPENWEBUI_URL: http://open-webui:8080
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY:-}
      AI_ENABLED: "true"
      MINECRAFT_PUBLIC_HOST: ${MINECRAFT_PUBLIC_HOST:-localhost}
      # These previously aliased PORT_MINECRAFT/PORT_MINECRAFT_BEDROCK (the
      # vars that control the actual Docker host-port binding in
      # evoke-infra/docker-compose.yml), so there was no way to advertise a
      # different external port than the container's real bind port -- e.g.
      # for a router-level port remap (external X -> internal 25565/19132).
      # Now genuinely independent, matching MINECRAFT_PUBLIC_HOST's pattern.
      MINECRAFT_PUBLIC_PORT_JAVA: ${MINECRAFT_PUBLIC_PORT_JAVA:-25565}
      MINECRAFT_PUBLIC_PORT_BEDROCK: ${MINECRAFT_PUBLIC_PORT_BEDROCK:-19132}
      # .env.example has documented this since it was added, but it was
      # never actually wired through here -- setting it in .env silently
      # did nothing; main.py's _companion_url() never saw it.
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  brightspace-sim:
    build:
      context: ../brightspace-sim
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - evoke-infra-network
    environment:
      EVOKE_API_URL: http://web:8000
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minecraft-bridge:
    build:
      context: ../evoke-minecraft-bridge
      dockerfile: Dockerfile
    networks:
      - evoke-infra-network
    environment:
      DATABASE_URL: postgresql://evoke:devsecret123@postgres:5432/evoke
      REDPANDA_BROKER: redpanda:29092
      MINECRAFT_HOST: minecraft
      MINECRAFT_RCON_PORT: 25575
      RCON_PASSWORD: devsecret123
      OPENWEBUI_URL: http://open-webui:8080
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY:-}
    healthcheck:
      # No HTTP server in this service (a Kafka consumer loop) — process-liveness
      # only, not a real readiness signal. A proper check would need bridge.py to
      # write a heartbeat file this checks the freshness of; flagged, not built here.
      test: ["CMD-SHELL", "pgrep -f bridge.py || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  evoke-infra-network:
    external: true
