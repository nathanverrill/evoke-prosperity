name: evoke

services:
  web:
    build: .
    ports:
      - "8000:8000"
    networks:
      - evoke-infra-network
    environment:
      DATABASE_URL: postgresql://evoke:devsecret123@postgres:5432/evoke
      REDPANDA_BROKER: redpanda:29092
      OPENSEARCH_NODE: http://opensearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: devsecret123
      BRIGHTSPACE_SIM_URL: http://brightspace-sim:8001
      OPENWEBUI_URL: http://open-webui:8080
      AI_ENABLED: "true"

  brightspace-sim:
    build:
      context: ../brightspace-sim
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - evoke-infra-network
    environment:
      EVOKE_API_URL: http://web:8000

  minecraft-bridge:
    build:
      context: ../evoke-minecraft-bridge
      dockerfile: Dockerfile
    networks:
      - evoke-infra-network
    environment:
      DATABASE_URL: postgresql://evoke:devsecret123@postgres:5432/evoke
      REDPANDA_BROKER: redpanda:29092
      MINECRAFT_HOST: minecraft
      MINECRAFT_RCON_PORT: 25575
      RCON_PASSWORD: devsecret123

networks:
  evoke-infra-network:
    external: true
