<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVOKE Companion Mode</title>
    <style>
        body { font-family: Arial; margin: 0; background: #2c3e50; color: white; padding: 10px; }
        h1 { font-size: 18px; margin: 0 0 15px 0; }
        .section { margin-bottom: 15px; }
        .section h3 { font-size: 14px; margin: 10px 0 5px 0; }
        .notification { background: #4caf50; padding: 8px; margin: 5px 0; border-radius: 4px; font-size: 12px; }
        button { background: #2196F3; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 12px; }
        .chat { background: #1a252f; padding: 10px; border-radius: 4px; height: 200px; overflow-y: auto; margin-bottom: 10px; font-size: 11px; }
        .chat-msg { margin: 5px 0; }
        input { width: 100%; padding: 5px; border-radius: 4px; border: none; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🌲 EVOKE Companion</h1>
    
    <div class="section">
        <h3>Current Mission</h3>
        <div id="mission" style="font-size: 12px;">Loading...</div>
    </div>
    
    <div class="section">
        <h3>Pending Awards</h3>
        <div id="awards"></div>
    </div>
    
    <div class="section">
        <h3>B1llbot Chat</h3>
        <div class="chat" id="chat"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="chatInput" placeholder="Ask B1llbot..." onkeypress="if(event.key==='Enter') chatWithBillbot()">
            <button style="width: 30px;" onclick="chatWithBillbot()">→</button>
        </div>
    </div>

    <script>
        let currentUserId = null;
        async function init() {
            try {
                const response = await fetch('/api/dev-login', { method: 'POST' });
                const data = await response.json();
                currentUserId = data.user_id;
                loadData();
                setInterval(loadData, 10000);
            } catch(e) {
                console.error(e);
            }
        }
        async function loadData() {
            if (!currentUserId) return;
            try {
                const missions = await fetch(`/api/missions?user_id=${currentUserId}`);
                const missionsData = await missions.json();
                if (missionsData.missions.length > 0) {
                    const m = missionsData.missions[0];
                    document.getElementById('mission').textContent = m.title;
                }
                const notifs = await fetch(`/api/notifications/${currentUserId}`);
                const notifsData = await notifs.json();
                document.getElementById('awards').innerHTML = notifsData.notifications.map(n => `
                    <div class="notification">
                        <p>${n.award_id.substring(0,8)} <button onclick="collectAward('${n.award_id}')">Collect</button></p>
                    </div>
                `).join('');
            } catch(e) {
                console.error(e);
            }
        }
        async function collectAward(awardId) {
            try {
                await fetch(`/api/awards/${awardId}/collect`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: currentUserId }) });
                loadData();
            } catch(e) {}
        }
        async function chatWithBillbot() {
            const input = document.getElementById('chatInput');
            const msg = input.value;
            if (!msg) return;
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="chat-msg"><strong>You:</strong> ${msg}</div>`;
            input.value = '';
            try {
                const response = await fetch('/api/billbot/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: currentUserId, message: msg }) });
                const data = await response.json();
                chat.innerHTML += `<div class="chat-msg"><strong>B1llbot:</strong> ${data.reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {}
        }
        init();
    </script>
</body>
</html>
