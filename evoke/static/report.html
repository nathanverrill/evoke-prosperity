<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EVOKE Student Report</title>
<meta name="robots" content="noindex, nofollow">
<style>
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; color: #111; }
  h1 { font-size: 22px; margin-bottom: 2px; }
  .sub { color: #666; margin-bottom: 24px; }
  .warn { background: #fff4e5; border: 1px solid #f0c36d; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 24px; }
  .stat-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat { border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; min-width: 120px; }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #888; }
  .stat .value { font-size: 20px; font-weight: 600; }
  h2 { font-size: 16px; margin: 28px 0 10px; border-bottom: 1px solid #ddd; padding-bottom: 6px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: top; }
  th { color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .mission-row.graded { background: #f3fbf3; }
  .grade { font-weight: 600; }
  .feedback { color: #444; font-style: italic; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .status.graded { background: #d4f4dd; color: #146c2e; }
  .status.brightspace { background: #d9ecff; color: #0b5cab; }
  .status.brightspace_sync_failed { background: #ffe1e1; color: #a30d0d; }
  .status.submitted { background: #eee; color: #555; }
  .status.not_started { background: #f5f5f5; color: #999; }
  .powers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
  .power { border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 12px; }
  .power.earned { background: #f3fbf3; border-color: #9fd6ac; }
  .power .name { font-weight: 600; }
  .power .qual { color: #888; font-size: 10px; text-transform: uppercase; }
  #err { color: #a30d0d; }
  select#uid { width: 360px; padding: 5px 6px; }
</style>
</head>
<body>
<h1>EVOKE Student Report</h1>
<div class="sub">Unauthenticated test/debug view -- assignments, grades, and gamification state for one provided user.</div>
<div class="warn">Test page: not part of the authenticated product. Anyone with this URL and a user_id can view that student's grades and feedback. Do not link this from student-facing pages.</div>

<div>
  <label>Student: <select id="uid"><option value="">Loading students…</option></select></label>
  <button id="load">Load</button>
</div>

<div id="content"></div>
<div id="err"></div>

<script>
function qs(name) {
  return new URLSearchParams(location.search).get(name);
}
function esc(s) {
  return (s == null ? '' : String(s)).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; });
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString(); } catch(e) { return iso; }
}
async function loadReport(userId) {
  var content = document.getElementById('content');
  var err = document.getElementById('err');
  err.textContent = '';
  content.innerHTML = 'Loading…';
  var res;
  try {
    res = await fetch('/api/test/student-report/' + encodeURIComponent(userId));
  } catch (e) {
    content.innerHTML = '';
    err.textContent = 'Request failed: ' + e;
    return;
  }
  if (!res.ok) {
    content.innerHTML = '';
    err.textContent = 'Error ' + res.status + ': ' + await res.text();
    return;
  }
  var d = await res.json();
  var missionsHtml = d.missions.map(function(m) {
    var cls = 'mission-row' + (m.submission_status === 'graded' ? ' graded' : '');
    return '<tr class="' + cls + '">' +
      '<td>Week ' + esc(m.week) + '</td>' +
      '<td>' + esc(m.title) + '<br><span style="color:#888;font-size:11px;">' + esc(m.superpower || '') + '</span></td>' +
      '<td><span class="status ' + esc(m.submission_status) + '">' + esc(m.submission_status.replace(/_/g,' ')) + '</span></td>' +
      '<td class="grade">' + (m.grade != null ? esc(m.grade) + ' / 100' : '&mdash;') + '</td>' +
      '<td class="feedback">' + (m.feedback ? esc(m.feedback) : '') + '</td>' +
      '<td>' + fmtDate(m.graded_at || m.submitted_at) + '</td>' +
      '</tr>';
  }).join('');

  var powersHtml = Object.keys(d.powers).map(function(key) {
    var p = d.powers[key];
    return '<div class="power' + (p.earned ? ' earned' : '') + '">' +
      '<div class="qual">' + esc(p.quality) + '</div>' +
      '<div class="name">' + esc(key) + (p.earned ? ' ✓' : '') + '</div>' +
      '</div>';
  }).join('');

  var qualitiesHtml = Object.keys(d.qualities).map(function(key) {
    var q = d.qualities[key];
    return '<div class="stat"><div class="label">' + esc(key) + '</div><div class="value">' +
      (q.earned ? '✓ Earned' : q.powers_earned + '/' + q.powers_total) + '</div></div>';
  }).join('');

  content.innerHTML =
    '<h2>' + esc(d.display_name || d.user_id) + '</h2>' +
    '<div class="stat-row">' +
      '<div class="stat"><div class="label">Level</div><div class="value">' + esc(d.level) + '</div></div>' +
      '<div class="stat"><div class="label">Rank</div><div class="value">' + esc(d.rank_title) + '</div></div>' +
      '<div class="stat"><div class="label">XP</div><div class="value">' + esc(d.xp) + '</div></div>' +
    '</div>' +
    '<h2>Superpowers (Qualities)</h2>' +
    '<div class="stat-row">' + qualitiesHtml + '</div>' +
    '<h2>Powers (16)</h2>' +
    '<div class="powers-grid">' + powersHtml + '</div>' +
    '<h2>Assignments</h2>' +
    '<table><thead><tr><th>Week</th><th>Mission</th><th>Status</th><th>Grade</th><th>Feedback</th><th>Date</th></tr></thead><tbody>' +
      (missionsHtml || '<tr><td colspan="6">No missions found for this campaign.</td></tr>') +
    '</tbody></table>';
}

async function populateStudents(selectId) {
  var select = document.getElementById('uid');
  try {
    var res = await fetch('/api/test/students');
    var data = await res.json();
    select.innerHTML = '<option value="">-- choose a student --</option>' +
      data.students.map(function(s) {
        return '<option value="' + esc(s.id) + '">' + esc(s.display_name || s.email || s.id) + '</option>';
      }).join('');
    if (selectId) select.value = selectId;
  } catch (e) {
    select.innerHTML = '<option value="">Failed to load students</option>';
  }
}

document.getElementById('load').addEventListener('click', function() {
  var uid = document.getElementById('uid').value;
  if (uid) {
    history.replaceState(null, '', '?user_id=' + encodeURIComponent(uid));
    loadReport(uid);
  }
});
document.getElementById('uid').addEventListener('change', function() {
  var uid = this.value;
  if (uid) {
    history.replaceState(null, '', '?user_id=' + encodeURIComponent(uid));
    loadReport(uid);
  }
});

var initial = qs('user_id');
populateStudents(initial).then(function() {
  if (initial) loadReport(initial);
});
</script>
</body>
</html>
