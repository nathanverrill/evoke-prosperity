# Thin gateway, not a rewrite (see GUARDRAILS_PLAN.md). Every real AI call
# site in the app points here now instead of straight at OpenWebUI; this
# file is the one place the safety rules live.
#
# Phase 0 (pass-through): model_list below just forwards to the same
# OpenWebUI "billbot" custom model every call site already used directly.
# Phase 1 (cheap wins): the guardrails list adds LiteLLM's built-in content
# filter (no external dependency) and Presidio PII detection (its own two
# containers, below) on both the way in (pre_call) and the way out
# (post_call) -- a message can carry PII the model itself echoes back, not
# just PII a student typed. Every guardrail below sets `default_on: true` --
# without it, LiteLLM only runs a guardrail when the CALLER opts in via a
# `guardrails: [...]` field on the request, which defeats the point (none
# of the app's call sites should have to remember to ask for safety).

model_list:
  - model_name: billbot
    litellm_params:
      model: openai/billbot
      api_base: http://open-webui:8080/api
      api_key: os.environ/OPENWEBUI_API_KEY

litellm_settings:
  drop_params: true

guardrails:
  # --- Content filter: harmful content categories relevant to a K-12
  # audience. Deliberately NOT enabling the "denied_financial_advice" /
  # "denied_medical_advice" categories that ship with this guardrail --
  # this app's entire premise is teaching financial literacy, so blocking
  # financial-advice-shaped replies would fight the product, not protect
  # students.
  - guardrail_name: "content-filter-pre"
    litellm_params:
      guardrail: litellm_content_filter
      mode: "pre_call"
      default_on: true
      categories:
        - category: "harmful_child_safety"
          enabled: true
          action: "BLOCK"
          severity_threshold: "low"
        - category: "harmful_self_harm"
          enabled: true
          action: "BLOCK"
          severity_threshold: "low"
        - category: "harmful_violence"
          enabled: true
          action: "BLOCK"
          severity_threshold: "medium"
        - category: "harmful_illegal_weapons"
          enabled: true
          action: "BLOCK"
          severity_threshold: "medium"
        - category: "prompt_injection_jailbreak"
          enabled: true
          action: "BLOCK"
          severity_threshold: "medium"

  - guardrail_name: "content-filter-post"
    litellm_params:
      guardrail: litellm_content_filter
      mode: "post_call"
      default_on: true
      categories:
        - category: "harmful_child_safety"
          enabled: true
          action: "BLOCK"
          severity_threshold: "low"
        - category: "harmful_self_harm"
          enabled: true
          action: "BLOCK"
          severity_threshold: "low"
        - category: "harmful_violence"
          enabled: true
          action: "BLOCK"
          severity_threshold: "medium"

  # --- Presidio PII: mask on the way in so a student's phone number/email/
  # name never reaches the model or gets logged upstream; mask on the way
  # out so a hallucinated or echoed identifier never reaches the student
  # either. SSNs are the one category worth an outright BLOCK rather than
  # a mask -- there's no legitimate reason a student conversation should
  # contain one at all.
  - guardrail_name: "presidio-pii-pre"
    litellm_params:
      guardrail: presidio
      mode: "pre_call"
      default_on: true
      presidio_score_thresholds:
        US_SSN: 0.5
        CREDIT_CARD: 0.8
        EMAIL_ADDRESS: 0.6
        PHONE_NUMBER: 0.6
        PERSON: 0.6
        LOCATION: 0.6
      pii_entities_config:
        US_SSN: "BLOCK"
        CREDIT_CARD: "MASK"
        EMAIL_ADDRESS: "MASK"
        PHONE_NUMBER: "MASK"
        PERSON: "MASK"
        LOCATION: "MASK"

  - guardrail_name: "presidio-pii-post"
    litellm_params:
      guardrail: presidio
      mode: "post_call"
      default_on: true
      presidio_score_thresholds:
        US_SSN: 0.5
        CREDIT_CARD: 0.8
        EMAIL_ADDRESS: 0.6
        PHONE_NUMBER: 0.6
        PERSON: 0.6
        LOCATION: 0.6
      pii_entities_config:
        US_SSN: "BLOCK"
        CREDIT_CARD: "MASK"
        EMAIL_ADDRESS: "MASK"
        PHONE_NUMBER: "MASK"
        PERSON: "MASK"
        LOCATION: "MASK"
